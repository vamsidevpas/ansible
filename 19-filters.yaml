- name: demo on filters
  hosts: local
  connection: local
  vars:
    topics: Linux, Shell, Ansible, Terraform
    tagMap:
      name: Ansible
      project: roboshop
      environment: dev
    full_name: Sivakumar Reddy M
    ip_address: 1780.90.78.20
    tagsList: [
        {
            "key": "name",
            "value": "Ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "environment",
            "value": "dev"
        }
    ]
  tasks:
  - name: convert string to list
    debug:
      msg: "Topics are: {{ topics | split(',') }}"

  - name: set default value
    debug:
      msg: "Hi {{ GREETING | default('Good Morning') }}"

  - name: convert map to list
    debug:
      msg: "{{ tagMap | dict2items  }}"

  - name: convert list to map
    debug:
      msg: "{{ tagsList | items2dict  }}"

  - name: convert to uppercase
    debug:
      msg: "{{ full_name | upper }}"

  - name: convert to lowercase
    debug:
      msg: "{{ full_name | lower }}"

  - name: check ipv4 address
    debug:
      msg: "{{ ip_address | ansible.utils.ipv4 }}"